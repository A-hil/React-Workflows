<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Игра на реакцию</title>
    <style>
        h1 { text-align: center; }
        #timer-display {
            display: flex;
            justify-content: center;
            font-size: 24px; 
            color: aqua; 
            margin-bottom: 15px;
        }
        #btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>   
    <h1>Реакция на время</h1>
    <div id="timer-display">
        Время: <span id="seconds">0</span> сек.
    </div>
    <button id="btn">Нажми на 5-й секунде!</button>

    <script>
        let secondsCount = 0;
        let isGameOver = false; 
        const btn = document.querySelector('#btn');
        const secondsElement = document.querySelector('#seconds');
        const timer = setInterval(() => {
            secondsCount++; 
            secondsElement.textContent = secondsCount;
            if (secondsCount > 5) {
                clearInterval(timer);
                if (!isGameOver) {
                    alert("Время истекло! Ты не успел.");
                    isGameOver = true;
                }
            }
        }, 1000);
        btn.addEventListener('click', () => {
            if (isGameOver) return; 
            clearInterval(timer); 
            isGameOver = true;
            if (secondsCount < 5) {
                console.log("Ты нажал раньше 5 секунд, ты проиграл");
                alert("Слишком рано! Секунда: " + secondsCount);
            } else if (secondsCount === 5) {
                console.log("Ты уложился во время, ты победил!");
                alert("Точно в цель! Да ты снайпер!");
            }
        });
    </script>
</body>
</html>

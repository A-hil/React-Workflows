<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадай код</title>
    <style>
        /* Применяем ко всему базовые стили шрифта и цвета */
        * {
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            color: skyblue;
        }

        body {
            background: sandybrown;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            margin: 0;
        }

        #container {
            margin-top: 20px;
            display: none; /* Скрыто по умолчанию */
        }

        #easter-egg {
            width: 200px;
            border-radius: 10px;
        }

        input {
            margin-top: 20px;
            padding: 10px;
            border: 2px solid skyblue;
            background: white;
            color: #333;
            outline: none;
        }
        #secret{
            text-align: center;
            
        }
    </style>
</head>
<body>

    <h1>Угадай последовательность букв!</h1>
    <p>Подсказка : введи abcd</p>
    <input type="text" id="textEnter" placeholder="Введите код...">

    <div id="container">
        <img id="easter-egg" src="https://images.unsplash.com/vector-1768891290447-daa3e46f545d?q=80&w=795&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="image">
        <p id = "secret">Секрет открыт!</p>
    </div>

    <script>
        const secretCode = 'abcd';
        const inputField = document.getElementById('textEnter');
        const container = document.getElementById('container');

        inputField.addEventListener('input', () => {
            if (inputField.value.toLowerCase() === secretCode) {
                container.style.display = 'block';
                inputField.style.borderColor = 'lime';
            } else {
                container.style.display = 'none';
                inputField.style.borderColor = 'skyblue';
            }
        });
    </script>
</body>
</html>

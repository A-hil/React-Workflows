<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
function fetchData(promises) {
    return Promise.all(promises)
        .then((values) => {
            console.log("Успех:", values);
        })
        .catch((error) => {
            console.error("Поймана ошибка:", error);
        });
}

const promise1 = Promise.resolve('Данные 1');
const promise2 = Promise.resolve('Данные 2');
const promise3 = Promise.reject('Ошибка при получении данных');

fetchData([promise1, promise2, promise3]);

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-size: large;
            color: white;
            background: #000;
        }

        #btn{
             background-color: aqua;
            border: none;
            cursor: pointer;

            width: 100px;           
            height: 100px;          
            border-radius: 50%;    
            
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            
            cursor: pointer;
            left: 0%;
        }

        #item-box{
            position: absolute;
            background: yellowgreen;
            margin: auto;
            flex-grow: 1;            
            padding: 8px;
        }
        #item-position{
            display: flex;
            justify-content: center; 
            padding: 20px; 
        }
        #text-area {
            display: flex;
            justify-content: center;
            flex-grow: 1; 
            padding: 8px;
        }
    </style>
</head>
<body>
    <div id ="item-position">
    <div id = "item-box">
    <div id = "text-area">
    <input type="text" placeholder="Введите текст" id = "placeholder">
    </div>
    <button type="button" id = "btn" style="color: #000; font-weight: bolder;">Отправить</button>
      <div id="result-display" style="margin-top: 20px; color: yellow;"></div>
    </div>
    </div>
    <script>
        const btn = document.querySelector('#btn');
        const input = document.querySelector('#placeholder');
        const resultDisplay = document.querySelector('#result-display');

        btn.addEventListener('click', () => {
            const originalText = input.value; 
            
            if (originalText.trim() !== "") {
                const mirroredText = originalText.split("").reverse().join("");
                resultDisplay.textContent = `Оригинал: ${originalText} | Зеркало: ${mirroredText}`;
                input.value = ""; 
            }
        }); 
    </script>
</body>
</html>

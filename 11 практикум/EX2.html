<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
const createAsyncTask = (id, delay) => {
    return new Promise((resolve) => {
        console.log(`Задача ${id} началась (займёт ${delay}мс)`);
        setTimeout(() => {
            const result = `Результат задачи ${id}`;
            console.log(`Задача ${id} завершена`);
            resolve(result);
        }, delay);
    });
};

async function runTasksSimultaneously() {
    console.log(" Запуск параллельных задач");

    const tasks = [
        createAsyncTask(1, 3000), 
        createAsyncTask(2, 1000), 
        createAsyncTask(3, 2000)  
    ];
    
    try {

        const results = await Promise.all(tasks);

        console.log("Все задачи выполнены!");
        console.log("Результаты:", results);

        return results;
    } catch (error) {
        console.error("Ошибка:", error);
    }
}
runTasksSimultaneously();
    </script>
</body>
</html>
